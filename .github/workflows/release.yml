name: Publish to npm

# Publishes to npm automatically whenever a GitHub Release is published.
# Requires repo secret NPM_TOKEN (an npm automation / granular token with
# read-write access). Provenance is attached via OIDC (id-token: write).

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      # Fail fast if the release tag (vX.Y.Z) doesn't match package.json version.
      - name: Verify tag matches package.json version
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Release tag '$TAG' does not match package.json version '$PKG'"
            exit 1
          fi

      - run: npm run typecheck
      - run: npm run build
      - run: npm test

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
